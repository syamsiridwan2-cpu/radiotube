<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RadioStream</title>
    <meta name="description" content="Stream 30,000+ radio stations worldwide" />
    <meta name="theme-color" content="#1a73e8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />

    <!-- CSS - cache busted -->
    <link rel="stylesheet" href="css/variables.css?v=9" />
    <link rel="stylesheet" href="css/base.css?v=9" />
    <link rel="stylesheet" href="css/header.css?v=9" />
    <link rel="stylesheet" href="css/sidebar.css?v=9" />
    <link rel="stylesheet" href="css/content.css?v=9" />
    <link rel="stylesheet" href="css/player.css?v=9" />
    <link rel="stylesheet" href="css/animations.css?v=9" />
    <link rel="stylesheet" href="css/responsive.css?v=9" />

    <!-- FORCE OVERRIDE: inline critical styles to defeat cached CSS -->
    <style id="criticalFix">
        .station-card .card-art .playing-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0 !important;
            transition: opacity 0.3s;
        }
        .station-card:hover .card-art .playing-overlay {
            opacity: 1 !important;
        }
        .station-card.active .card-art .playing-overlay {
            opacity: 1 !important;
        }
        .station-card .card-art .playing-indicator {
            display: none !important;
        }
        .station-card .card-art .playing-indicator.active {
            display: block !important;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .station-card .card-art .eq-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 20px;
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
        }
        .station-card .card-art .eq-bars span {
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
            animation: eq-bar 0.8s ease-in-out infinite;
            transform-origin: bottom;
        }
        .station-card .card-art .eq-bars span:nth-child(2) { animation-delay: 0.1s; }
        .station-card .card-art .eq-bars span:nth-child(3) { animation-delay: 0.2s; }
        .station-card .card-art .eq-bars span:nth-child(4) { animation-delay: 0.3s; }

        .playlist-modal-overlay {
            position: fixed !important;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex !important;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .playlist-modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .toast {
            position: fixed;
            bottom: calc(var(--player-height, 80px) + 20px);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 999px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes eq-bar {
            0%, 100% { transform: scaleY(0.25); }
            50% { transform: scaleY(1); }
        }
        .now-playing-banner {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent), #0d47a1);
            border-radius: var(--radius, 12px);
            color: white;
            animation: slideDown 0.3s ease;
        }
        .now-playing-banner.visible {
            display: flex;
        }
        .npb-art {
            font-size: 2rem;
            flex-shrink: 0;
        }
        .npb-info {
            flex: 1;
            min-width: 0;
        }
        .npb-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        .npb-name {
            font-size: 1.05rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .npb-detail {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .npb-eq {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 20px;
            flex-shrink: 0;
        }
        .npb-eq span {
            width: 3px;
            height: 16px;
            background: white;
            border-radius: 2px;
            animation: eq-bar 0.8s ease-in-out infinite;
            transform-origin: bottom;
        }
        .npb-eq span:nth-child(2) { animation-delay: 0.1s; }
        .npb-eq span:nth-child(3) { animation-delay: 0.2s; }
        .npb-eq span:nth-child(4) { animation-delay: 0.3s; }
        .npb-play-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .npb-play-btn:hover {
            background: rgba(255,255,255,0.35);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pl-remove-btn, .pl-move-btn {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 2;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .pl-remove-btn { top: 20px; right: 16px; }
        .pl-remove-btn:hover { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.1); }
        .pl-move-btn { top: 20px; }
        .pl-move-btn[data-dir="-1"] { right: 50px; }
        .pl-move-btn[data-dir="1"] { right: 84px; }
        .pl-move-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
        .playlist-rename-btn {
            background: none;
            border: none;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
            padding: 2px 4px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.2s;
        }
        .playlist-sidebar-item:hover .playlist-rename-btn { opacity: 1; }
        .playlist-rename-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="version-badge" id="versionBadge">v6.6.3</div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
            <a href="#" class="logo" id="logoLink">
                <span class="logo-icon">📻</span>
                <span>RadioStream</span>
                <span class="logo-version">v6.6.3</span>
            </a>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari stasiun, negara, atau genre..." autocomplete="off" />
                <select class="search-type-select" id="searchType">
                    <option value="name">Nama</option>
                    <option value="country">Negara</option>
                    <option value="tag">Genre</option>
                </select>
                <div class="suggestions-dropdown" id="suggestions"></div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" id="favoritesBtn" aria-label="Favorit" title="Favorit">❤️</button>
            <button class="header-btn" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </div>
    </header>

    <!-- App Layout -->
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="section-label">Menu</div>
                <div class="sidebar-item active" data-view="home">
                    <span class="item-icon">🏠</span>
                    <span>Beranda</span>
                </div>
                <div class="sidebar-item" data-view="favorites">
                    <span class="item-icon">❤️</span>
                    <span>Favorit</span>
                    <span class="item-badge" id="favCount">0</span>
                </div>
                <div class="sidebar-item" data-view="recent">
                    <span class="item-icon">🕐</span>
                    <span>Terakhir Diputar</span>
                    <span class="item-badge" id="recentlyPlayedCount">0</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-label">Genre</div>
                <div class="sidebar-item" data-genre="rock">🎸 Rock</div>
                <div class="sidebar-item" data-genre="jazz">🎷 Jazz</div>
                <div class="sidebar-item" data-genre="classical">🎻 Klasik</div>
                <div class="sidebar-item" data-genre="electronic">🎧 Elektronik</div>
                <div class="sidebar-item" data-genre="pop">🎤 Pop</div>
                <div class="sidebar-item" data-genre="hiphop">🎵 Hip Hop</div>
            </div>
            <div class="sidebar-section">
                <div class="section-label">Playlist Saya</div>
                <div id="playlistList" class="playlist-list"></div>
                <button id="createPlaylistBtn" class="create-playlist-btn">
                    <span>+</span> Buat Playlist
                </button>
            </div>
        </nav>

        <main class="main-content">
            <div id="nowPlayingBanner" class="now-playing-banner">
                <div class="npb-art" id="npbArt">📻</div>
                <div class="npb-info">
                    <div class="npb-label">Now Playing</div>
                    <div class="npb-name" id="npbName">-</div>
                    <div class="npb-detail" id="npbDetail">-</div>
                </div>
                <div class="npb-eq" id="npbEq">
                    <span></span><span></span><span></span><span></span>
                </div>
                <button class="npb-play-btn" id="npbPlayBtn">⏸</button>
            </div>
            <div class="content-header">
                <h2 id="contentTitle">Semua Stasiun</h2>
                <span class="result-count" id="resultCount">0 stasiun</span>
            </div>
            <div id="stationGrid" class="station-grid"></div>
            <div class="load-more-wrap">
                <button class="load-more-btn" id="loadMoreBtn">Muat Lebih Banyak</button>
            </div>
            <div class="status-msg" id="statusMsg"></div>
        </main>
    </div>

    <!-- Player -->
    <div class="player" id="player">
        <div class="player-art" id="playerArt">📻</div>
        <div class="player-info">
            <div class="station-name" id="playerStationName">Tidak ada yang diputar</div>
            <div class="station-detail" id="playerStationDetail">Pilih stasiun untuk mulai mendengarkan</div>
            <div class="station-error" id="playerStationError" style="display:none;color:#ef4444;font-size:0.8rem;margin-top:2px;"></div>
        </div>
        <div class="player-controls">
            <button id="prevBtn" aria-label="Sebelumnya">⏮</button>
            <button class="play-btn" id="playBtn" aria-label="Play/Pause">▶</button>
            <button id="retryBtn" class="player-extra-btn" aria-label="Coba Lagi" title="Coba Lagi" style="display:none;">🔄</button>
            <button id="nextBtn" aria-label="Berikutnya">⏭</button>
            <button id="addToPlaylistBtn" class="player-extra-btn" aria-label="Tambah ke Playlist" title="Tambah ke Playlist">📋</button>
            <button id="toggleFavBtn" class="player-extra-btn" aria-label="Favorit" title="Favorit">⭐</button>
            <button id="shareStationBtn" class="player-extra-btn" aria-label="Share" title="Share stasiun ini">📤</button>
        </div>
        <div class="player-progress" id="playerProgress">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-volume">
            <button class="mute-btn" id="muteBtn" aria-label="Mute">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
        </div>
    </div>

    <audio id="audio" preload="none"></audio>

    <style>
        .version-badge {
            position: fixed;
            bottom: calc(var(--player-height, 80px) + 12px);
            right: 16px;
            font-size: 0.6rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            opacity: 0.6;
            z-index: 150;
            cursor: pointer;
            font-weight: 500;
        }
        .version-badge:hover { opacity: 1; }
    </style>

    <!-- CACHE CLEAR ON VERSION CHANGE + REGISTER SW -->
    <script>
        (async function bootstrap() {
            const currentVersion = '6.6.3';
            const savedVersion = localStorage.getItem('radio_version');

            if (savedVersion !== currentVersion) {
                if ('caches' in window) {
                    const names = await caches.keys();
                    for (const n of names) await caches.delete(n);
                }
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const r of regs) await r.unregister();
                }
                localStorage.setItem('radio_version', currentVersion);
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
            }
        })();
    </script>
    <script src="js/app.js?v=14"></script>
</body>
</html>
