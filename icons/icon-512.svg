<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a0a28"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff8866"/>
    </linearGradient>
    <linearGradient id="radioBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#2a1a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00a8cc"/>
      <stop offset="100%" stop-color="#ff8866"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Glow border -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.5"/>

  <!-- Radio body -->
  <rect x="108" y="160" width="296" height="210" rx="28" fill="url(#radioBody)" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>

  <!-- Antenna -->
  <line x1="185" y1="160" x2="185" y2="92" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" filter="url(#glowFilter)"/>
  <circle cx="185" cy="86" r="7" fill="#00d4ff" filter="url(#glowFilter)"/>

  <!-- Signal waves -->
  <path d="M205 100 Q230 72 255 100" fill="none" stroke="#00d4ff" stroke-width="3.5" stroke-linecap="round" opacity="0.8" filter="url(#glowFilter)"/>
  <path d="M215 116 Q235 96 255 116" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M225 132 Q240 118 255 132" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" opacity="0.3"/>

  <!-- Speaker circle -->
  <circle cx="195" cy="265" r="52" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
  <circle cx="195" cy="265" r="32" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.6"/>
  <circle cx="195" cy="265" r="10" fill="#00d4ff" opacity="0.9"/>

  <!-- Play button triangle -->
  <path d="M288 222 L288 308 L345 265 Z" fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glowFilter)"/>

  <!-- Microphone inside play -->
  <rect x="310" y="248" width="16" height="26" rx="8" fill="none" stroke="#ff8866" stroke-width="2" opacity="0.8"/>
  <path d="M307 262 Q318 276 329 262" fill="none" stroke="#ff8866" stroke-width="1.8" opacity="0.6"/>
  <line x1="318" y1="272" x2="318" y2="282" stroke="#ff8866" stroke-width="1.8" opacity="0.6"/>

  <!-- Power button -->
  <circle cx="345" cy="330" r="14" fill="none" stroke="#ff8866" stroke-width="2.5" opacity="0.7"/>
  <line x1="345" y1="319" x2="345" y2="327" stroke="#ff8866" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Subtle wave decorations -->
  <path d="M0 370 Q128 320 256 370 Q384 420 512 370" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>
  <path d="M0 395 Q128 345 256 395 Q384 445 512 395" fill="none" stroke="#ff8866" stroke-width="0.8" opacity="0.1"/>
</svg>
